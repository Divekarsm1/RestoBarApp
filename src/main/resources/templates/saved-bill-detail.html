<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bill - Table [[${tableNumber}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .receipt-container {
            max-width: 450px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .receipt-header { border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .receipt-footer { border-top: 2px dashed #eee; padding-top: 15px; margin-top: 15px; }
        @media print { .no-print { display: none; } body { background: white; padding: 0; } .receipt-container { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<div class="receipt-container">
    <div class="receipt-header text-center">
        <h2 class="fw-bold mb-0">RESTBAR PLAZA</h2>
        <div class="badge bg-dark text-white my-2">
            BILL NO: <span th:text="${bill.billNumber}">BN-0000</span>
        </div>
        <p class="text-muted small mb-0">Table #<span th:text="${tableNumber}">1</span></p>
        <p class="small text-muted" th:text="${#temporals.format(bill.checkoutTime, 'dd MMM yyyy, HH:mm')}"></p>
    </div>

    <table class="table table-borderless sm">
	    <thead>
	        <tr class="border-bottom">
	            <th>Item</th>
	            <th class="text-center">Qty</th>
	            <th class="text-end">Amt</th>
	        </tr>
	    </thead>
	    <tbody>
	        <tr th:each="item : ${items}">
	            <td th:text="${item.name}">Item Name</td>
	            <td class="text-center" th:text="${item.quantity}">0</td>
	            <td class="text-end" th:text="'₹' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">₹0.00</td>
	        </tr>
	        <tr th:if="${#lists.isEmpty(items)}">
	            <td colspan="3" class="text-center text-muted small">No items found in record</td>
	        </tr>
	    </tbody>
	</table>

    <div class="receipt-footer">
        <div class="d-flex justify-content-between small text-muted">
            <span>Sub-Total:</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(subTotal, 1, 2)}">₹0.00</span>
        </div>
        <div class="d-flex justify-content-between small text-muted">
            <span>GST (5%):</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(taxAmount, 1, 2)}">₹0.00</span>
        </div>
        <div class="border-top my-2"></div>
        <div class="d-flex justify-content-between fs-4 fw-bold">
            <span>TOTAL:</span>
            <span class="text-primary" th:text="'₹' + ${#numbers.formatDecimal(total, 1, 2)}">₹0.00</span>
        </div>
    </div>

    <div class="mt-4 no-print d-grid gap-2">
        <button onclick="window.print()" class="btn btn-outline-dark">
            <i class="bi bi-printer"></i> Print Receipt
        </button>
        <a href="/bill/history" class="btn btn-secondary">Back to History</a>
    </div>
</div>

</body>
</html>
