<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Active Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .order-card { border-radius: 15px; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-5px); }
        .status-badge { font-size: 0.8rem; padding: 0.5em 1em; border-radius: 20px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a th:href="@{/welcome}" class="navbar-brand fw-bold">
            <i class="bi bi-chevron-left"></i> Waiter Dashboard
        </a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Active Orders</h2>
        <a th:href="@{/order}" class="btn btn-primary rounded-pill">
            <i class="bi bi-plus-lg"></i> New Order
        </a>
    </div>

    <div th:if="${orders.empty}" class="text-center py-5">
        <i class="bi bi-clipboard-x display-1 text-muted"></i>
        <p class="lead mt-3 text-muted">All clear! No pending orders.</p>
    </div>

    <div class="row">
        <div th:each="order : ${orders}" class="col-md-6 col-lg-4 mb-4">
            <div class="card order-card border-0 shadow-sm">
                
                <div class="card-header d-flex justify-content-between align-items-center py-3" 
                     th:classappend="${order.status == 'ACCEPTED' ? 'bg-info text-white' : 'bg-white border-bottom'}">
                    <span class="fw-bold fs-5">Table <span th:text="${order.tableNumber}">0</span></span>
                    <span class="badge status-badge" 
                          th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-light text-dark'}" 
                          th:text="${order.status}">STATUS</span>
                </div>

                <div class="card-body">
                    <ul class="list-group list-group-flush mb-4">
                        <li th:each="item : ${order.items}" class="list-group-item d-flex justify-content-between align-items-center px-0 bg-transparent">
                            <div>
                                <span class="badge bg-primary rounded-pill me-2" th:text="${item.quantity}">1</span>
                                <span class="fw-medium" th:text="${item.name}">Item Name</span>
                            </div>
                            <span class="text-muted small" th:text="'$' + ${item.price}">$0.00</span>
                        </li>
                    </ul>

                    <div class="d-grid gap-2">
                        
                        <form th:if="${order.status == 'PENDING'}" th:action="@{/order/accept}" method="post">
                            <input type="hidden" name="orderId" th:value="${order.id}" />
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                                <i class="bi bi-play-fill"></i> Accept Order
                            </button>
                        </form>

                        <div th:if="${order.status == 'ACCEPTED'}" class="text-center mb-2">
						    <div class="alert alert-info py-2 mb-2 border-0">
						        <i class="bi bi-fire"></i> Cooking: 
						        <span class="fw-bold prep-timer" 
								      th:data-start-time="${#temporals.format(order.acceptedAt, 'yyyy-MM-dd''T''HH:mm:ss')}">
								    0m 0s
								</span>
						    </div>
						    
						    <form th:action="@{/order/complete}" method="post">
						        <input type="hidden" name="orderId" th:value="${order.id}" />
						        <button type="submit" class="btn btn-success w-100 fw-bold py-2">
						            <i class="bi bi-check-lg"></i> Mark Delivered
						        </button>
						    </form>
						</div>
                    </div>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-3">
                    <small class="text-muted">
                        <i class="bi bi-clock"></i> Sent at <span th:text="${#temporals.format(order.orderTime, 'HH:mm')}">12:00</span>
                    </small>
                </div>
                <div class="card-footer bg-white border-0">
				    <a th:href="@{/table/bill/{num}(num=${order.tableNumber})}" 
				       class="btn btn-outline-dark w-100 btn-sm">
				        <i class="bi bi-calculator"></i> View Table Bill
				    </a>
				</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
		function updateTimers() {
		    document.querySelectorAll('.prep-timer').forEach(timer => {
		        const startTimeStr = timer.getAttribute('data-start-time');
		        if (!startTimeStr) return;
		
		        // Ensure we parse the ISO string correctly
		        const startTime = new Date(startTimeStr).getTime();
		        const now = new Date().getTime();
		        
		        // Calculate the difference in milliseconds
		        const diff = now - startTime;
		
		        if (isNaN(diff) || diff < 0) {
		            timer.innerHTML = "0m 0s";
		            return;
		        }
		
		        const minutes = Math.floor(diff / (1000 * 60));
		        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
		
		        timer.innerHTML = minutes + "m " + seconds + "s";
		        
		        // Visual Warning: Turn red if preparation takes more than 15 minutes
		        if (minutes >= 15) {
		            const alertBox = timer.closest('.alert');
		            if (alertBox) alertBox.classList.replace('alert-info', 'alert-danger');
		        }
		    });
		}

    // Update every second
    setInterval(updateTimers, 1000);
    updateTimers(); // Initial call
</script>
</body>
</html>
