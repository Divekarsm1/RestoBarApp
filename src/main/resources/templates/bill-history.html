<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a th:href="@{/welcome}" class="navbar-brand fw-bold">
            <i class="bi bi-chevron-left"></i> Back to Dashboard
        </a>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/bill/history}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Search Bill No</label>
                    <input type="text" name="billNumber" class="form-control" placeholder="e.g. BN-001" th:value="${param.billNumber}">
                </div>
                
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Table</label>
                    <select name="tableNumber" class="form-select">
                        <option value="">All Tables</option>
                        <option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="'Table ' + ${i}" th:selected="${param.tableNumber == i.toString()}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label small fw-bold">From Date</label>
                    <input type="date" name="startDate" class="form-control" th:value="${param.startDate}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">To Date</label>
                    <input type="date" name="endDate" class="form-control" th:value="${param.endDate}">
                </div>

                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-filter"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h3 class="fw-bold mb-0">Billing History</h3>
            <span class="badge bg-primary" th:text="${bills.size()} + ' Records Found'">0 Records</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Bill No</th>
                            <th>Table</th>
                            <th>Date & Time</th>
                            <th>Amount</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="bill : ${bills}">
                            <td>
                                <span class="fw-bold text-primary" th:text="${bill.billNumber}">BN-000</span>
                            </td>
                            <td>
                                <span class="badge bg-secondary" th:text="'Table ' + ${bill.tableNumber}">Table 1</span>
                            </td>
                            <td th:text="${#temporals.format(bill.checkoutTime, 'dd MMM yyyy, HH:mm')}">Date</td>
                            <td class="fw-bold text-success" th:text="'₹' + ${#numbers.formatDecimal(bill.grandTotal, 1, 2)}">₹0.00</td>
                            <td class="text-center">
                                <a th:href="@{'/bill/view/' + ${bill.id}}" class="btn btn-outline-dark btn-sm">
                                    <i class="bi bi-eye"></i> View/Print
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bills)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-folder2-open display-4"></i>
                                <p class="mt-2">No billing records found matching the filters.</p>
                                <a th:href="@{/bill/history}" class="btn btn-link">Clear all filters</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
