<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Live Table Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .table-card { transition: transform 0.2s; cursor: pointer; text-decoration: none; }
        .table-card:hover { transform: scale(1.05); }
        .status-AVAILABLE { background-color: #d4edda; border: 2px solid #28a745; color: #155724; }
        .status-PENDING { background-color: #fff3cd; border: 2px solid #ffc107; color: #856404; }
        .status-OCCUPIED { background-color: #f8d7da; border: 2px solid #dc3545; color: #721c24; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Live Table Map</h2>
        <a th:href="@{/welcome}" class="btn btn-outline-dark">Back to Dashboard</a>
    </div>

    <div class="mb-4 d-flex gap-3">
        <span><i class="bi bi-square-fill text-success"></i> Available</span>
        <span><i class="bi bi-square-fill text-warning"></i> Pending Order</span>
        <span><i class="bi bi-square-fill text-danger"></i> Occupied</span>
    </div>

    <div class="row row-cols-2 row-cols-md-5 g-4">
        <div class="col" th:each="entry : ${tableStatusMap}">
            <a th:href="@{/table/bill/search(tableNumber=${entry.key})}" 
               th:class="'card h-100 shadow-sm table-card status-' + ${entry.value}">
                <div class="card-body text-center py-4">
                    <i class="bi bi-layout-text-window-reverse display-4"></i>
                    <h4 class="card-title mt-2 fw-bold" th:text="'Table ' + ${entry.key}">Table 1</h4>
                    <small class="text-uppercase fw-bold" th:text="${entry.value}">Status</small>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
