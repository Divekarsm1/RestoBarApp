<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #212529 0%, #343a40 100%); }
        .card { border: none; border-radius: 16px; }
        .btn-rounded { border-radius: 50px; padding-left: 1.5rem; padding-right: 1.5rem; }
        .table-container { background: white; border-radius: 16px; overflow: hidden; }
        .badge-category { background-color: #e9ecef; color: #495057; font-weight: 600; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a th:href="@{/welcome}" class="navbar-brand fw-bold">
            <i class="bi bi-chevron-left"></i> Back to Dashboard
        </a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-4">
            <div class="card shadow-sm mb-4 border-top border-primary border-4">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-plus-circle me-2"></i>Add New Item</h4>
                    <form th:action="@{/admin/menu/add}" th:object="${newItem}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Dish Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Category</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="" selected disabled>Select Category</option>
                                <option value="Starter">Starter</option>
                                <option value="Main Course">Main Course</option>
                                <option value="Dessert">Dessert</option>
                                <option value="Beverage">Beverage</option>
                                <option value="Liquor">Liquor</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Price (₹)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">₹</span>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="0.00" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold btn-rounded shadow-sm">
                            Add to Menu
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 border-0">
                    <h4 class="fw-bold mb-0">Current Menu Items</h4>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Item Details</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th class="text-center pe-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td class="ps-4">
                                        <div class="fw-bold" th:text="${item.name}" 
                                             th:classappend="${!item.available} ? 'text-muted text-decoration-line-through'"></div>
                                    </td>
                                    <td>
                                        <span class="badge badge-category rounded-pill px-3" th:text="${item.category}">Category</span>
                                    </td>
                                    <td class="fw-bold text-dark" th:text="'₹' + ${#numbers.formatDecimal(item.price, 1, 2)}">₹0.00</td>
                                    <td>
                                        <span th:if="${item.available}" class="badge bg-success-subtle text-success rounded-pill px-3">In Stock</span>
                                        <span th:unless="${item.available}" class="badge bg-danger-subtle text-danger rounded-pill px-3">Sold Out</span>
                                    </td>
                                    <td class="text-center pe-4">
                                        <div class="btn-group">
                                            <form th:action="@{'/admin/menu/toggle/' + ${item.id}}" method="post">
                                                <button type="submit" class="btn btn-sm btn-outline-secondary me-2 border-0" 
                                                        th:title="${item.available ? 'Mark Out of Stock' : 'Mark In Stock'}">
                                                    <i class="bi" th:classappend="${item.available} ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                                                </button>
                                            </form>
                                            <form th:action="@{'/admin/menu/delete/' + ${item.id}}" method="post" 
                                                  onsubmit="return confirm('Permanently delete this item?');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger border-0">
                                                    <i class="bi bi-trash3-fill"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(items)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="bi bi-egg-fried display-1"></i>
                                        <p class="mt-3">Your menu is empty. Start adding some dishes!</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
